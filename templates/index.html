<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flask TODO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="container py-5">
    <header class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
      <div>
        <h1 class="display-6 fw-bold">TODO Studio</h1>
        <p class="text-muted mb-0">Flask + SQLAlchemy + REST + jQuery + Bootstrap</p>
      </div>
    </header>

    <section class="card shadow-sm">
      <div class="card-body">
        <form id="todo-form" class="row g-2">
          <div class="col-12 col-md-9">
            <input
              type="text"
              class="form-control form-control-lg"
              id="todo-title"
              placeholder="Add a task..."
              autocomplete="off"
              required
            />
          </div>
          <div class="col-12 col-md-3 d-grid">
            <button class="btn btn-primary btn-lg" type="submit">Add Task</button>
          </div>
        </form>
        <div id="error" class="text-danger small mt-2 d-none"></div>
      </div>
    </section>

    <section class="mt-4">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <h2 class="h5 mb-0">Tasks</h2>
        <button id="refresh" class="btn btn-outline-secondary btn-sm">Refresh</button>
      </div>
      <ul id="todo-list" class="list-group list-group-flush"></ul>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
